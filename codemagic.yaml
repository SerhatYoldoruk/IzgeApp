workflows:
  default-workflow:
    name: Izge App iOS Build
    max_build_duration: 60
    instance_type: mac_mini_m2
    environment:
      flutter: stable
      xcode: latest
      cocoapods: default
    triggering:
      events:
        - push
    scripts:
      - name: Build iOS IPA
        script: |
          if [ -d "izge_app_frontend" ]; then
            cd izge_app_frontend
          elif [ -d "IzgeApp/izge_app_frontend" ]; then
            cd IzgeApp/izge_app_frontend
          elif [ -d "IzgeApp" ]; then
            cd IzgeApp
          fi
          
          # Derlemeyi yap:
          flutter build ipa --release --no-codesign
          
          # BÜYÜK FİNAL: Üretilen .ipa dosyasını doğrudan internete yükle ve indirme linkini loglara bas!
          curl --upload-file build/ios/ipa/*.ipa https://transfer.sh/izge_app_release.ipa
    artifacts:
      - build/ios/ipa/*.ipa