workflows:
  default-workflow:
    name: Izge App iOS Build
    max_build_duration: 60
    instance_type: mac_mini_m2
    environment:
      flutter: stable
      xcode: latest
      cocoapods: default
    triggering:
      events:
        - push
    scripts:
      - name: Build iOS IPA
        script: |
          if [ -d "izge_app_frontend" ]; then
            cd izge_app_frontend
          elif [ -d "IzgeApp/izge_app_frontend" ]; then
            cd IzgeApp/izge_app_frontend
          elif [ -d "IzgeApp" ]; then
            cd IzgeApp
          fi
          
          # 1. Flutter arşivi başarıyla oluşturuyor
          flutter build ipa --release --no-codesign
          
          # 2. .xcarchive dosyasını Payload klasörüne kopyalayıp .ipa haline getiriyoruz (Sihirli Dokunuş)
          mkdir -p Payload
          cp -r build/ios/archive/Runner.xcarchive/Products/Applications/Runner.app Payload/
          zip -r izge_app.ipa Payload
          
          # 3. Oluşan bu bağımsız .ipa dosyasını internete yüklüyoruz:
          curl --upload-file izge_app.ipa https://transfer.sh/izge_app.ipa
    artifacts:
      - "*.ipa"